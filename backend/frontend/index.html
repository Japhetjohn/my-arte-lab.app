<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>MyArteLab - Built for African Creators. Trusted by Global Clients.</title>

    <!-- Open Graph Meta Tags for Social Sharing (WhatsApp, Facebook, etc.) -->
    <meta property="og:title" content="MyArteLab - Built for African Creators. Trusted by Global Clients.">
    <meta property="og:description" content="Built for African Creators. Trusted by Global Clients.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://app.myartelab.com">
    <meta property="og:image" content="https://app.myartelab.com/logo.PNG">
    <meta property="og:site_name" content="MyArteLab">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MyArteLab - Built for African Creators. Trusted by Global Clients.">
    <meta name="twitter:description" content="Built for African Creators. Trusted by Global Clients.">
    <meta name="twitter:image" content="https://app.myartelab.com/logo.PNG">

    <!-- General Meta Description -->
    <meta name="description" content="Built for African Creators. Trusted by Global Clients.">

    <link rel="icon" type="image/png" href="/logo.PNG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav" id="topNav">
        <div class="container">
            <div class="nav-content">
                <!-- Left: Logo & Title -->
                <div class="nav-left">
                    <button class="icon-btn nav-back-btn" id="backBtn" style="display: none;" aria-label="Go back">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M15 10H5M5 10l5 5M5 10l5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                    <div class="nav-brand" onclick="navigateToPage('home')">
                        <div class="nav-logo-icon">
                            <img src="/logo.PNG" alt="MyArteLab">
                        </div>
                        <div class="nav-brand-text">
                            <h1>MyArteLab</h1>
                            <p>Built for African Creators</p>
                        </div>
                    </div>
                </div>

                <!-- Center: Search Bar -->
                <div class="nav-search">
                    <div class="search-wrapper">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <input type="text" id="navSearchInput" placeholder="Search creators, services...">
                    </div>
                </div>

                <!-- Right: Actions & User -->
                <div class="nav-right">
                    <button class="icon-btn nav-icon-btn" id="notificationsBtn" aria-label="Notifications" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M15 6.667A5 5 0 0 0 5 6.667c0 5.833-2.5 7.5-2.5 7.5h15S15 12.5 15 6.667zM11.442 17.5a1.667 1.667 0 0 1-2.884 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        <span class="notification-badge" style="display: none;">0</span>
                    </button>
                    
                    <!-- Featured Creators Avatars -->
                    <div class="nav-avatars" id="navAvatars" style="display: none;">
                        <div class="avatar-stack">
                            <img src="https://ui-avatars.com/api/?name=Creator+1&background=9747FF&color=fff" alt="Creator">
                            <img src="https://ui-avatars.com/api/?name=Creator+2&background=6B46FF&color=fff" alt="Creator">
                            <img src="https://ui-avatars.com/api/?name=Creator+3&background=8B5CF6&color=fff" alt="Creator">
                        </div>
                    </div>
                    
                    <button class="nav-add-btn" id="navAddBtn" aria-label="Create" style="display: none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    
                    <div class="user-menu-container" id="userMenuContainer">
                        <button class="nav-signin-btn" id="authBtn">Sign in</button>
                        <div class="nav-user-avatar" id="navUserAvatar" style="display: none;">
                            <img src="" alt="User" id="navUserImg">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="mainContent" class="main-content">
        <!-- Content will be dynamically loaded here -->
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z" stroke="currentColor" stroke-width="2" />
                <path d="M9 22V12h6v10" stroke="currentColor" stroke-width="2" />
            </svg>
            <span>Home</span>
        </button>
        <button class="nav-item" data-page="projects">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span>Projects</span>
        </button>
        <button class="nav-item" data-page="bookings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" />
                <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="2" />
            </svg>
            <span>Bookings</span>
        </button>
        <button class="nav-item" data-page="wallet">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5z"
                    stroke="currentColor" stroke-width="2" />
                <path d="M18 12h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <span>Wallet</span>
        </button>
    </nav>

    <!-- Modals Container -->
    <div id="modalsContainer"></div>

    <!-- Search Overlay -->
    <div class="overlay search-overlay" id="searchOverlay">
        <div class="overlay-content">
            <div class="search-header">
                <button class="icon-btn" id="closeSearchBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
                <input type="text" class="search-input"
                    placeholder="Search by service, city, style, e.g. wedding photographer Lagos" id="globalSearch">
            </div>
            <div class="search-results" id="searchResults">
                <div class="recent-searches">
                    <h3>Recent searches</h3>
                    <div class="search-tags">
                        <span class="tag">Wedding photographer</span>
                        <span class="tag">Lagos designer</span>
                        <span class="tag">Portrait photography</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Load app -->
    <script type="module" src="/js/app.js"></script>
</body>

</html>
