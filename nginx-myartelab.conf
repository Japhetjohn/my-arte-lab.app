server {
    server_name app.myartelab.com;

    client_max_body_size 50M;

    # Gzip compression for faster loading
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Uploaded Images (served directly by Nginx)
    location ^~ /uploads/ {
        alias /var/www/myartelab/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static images folder
    location ^~ /images/ {
        alias /var/www/myartelab/backend/frontend/images/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API Backend
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Static assets - with aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        root /var/www/myartelab/backend/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        try_files $uri =404;
    }

    # HTML files - no cache
    location ~* \.html$ {
        root /var/www/myartelab/backend/frontend;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Frontend - SPA fallback (handles /bookings/:id, /projects/:id, etc.)
    location / {
        root /var/www/myartelab/backend/frontend;
        index index.html;
        
        # Try to serve file directly, fallback to index.html for SPA routes
        try_files $uri $uri/ /index.html;
        
        # Add cache control for HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Specific SPA route handling for faster loading
    location ~ ^/(bookings|projects|creators|messages|wallet|notifications|settings|profile|explore) {
        root /var/www/myartelab/backend/frontend;
        try_files $uri $uri/ /index.html;
        
        # No cache for HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/app.myartelab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.myartelab.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = app.myartelab.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name app.myartelab.com;
    return 404;
}
