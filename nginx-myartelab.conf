server {
    server_name app.myartelab.com;

    client_max_body_size 50M;

    # Uploaded Images (served directly by Nginx)
    location ^~ /uploads/ {
        alias /var/www/myartelab/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static images folder
    location ^~ /images/ {
        alias /var/www/myartelab/backend/frontend/images/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API Backend
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Static assets - exact files first
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/myartelab/backend/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Frontend - SPA fallback
    location / {
        root /var/www/myartelab/backend/frontend;
        index index.html;
        try_files $uri /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/app.myartelab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.myartelab.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = app.myartelab.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name app.myartelab.com;
    return 404;
}
